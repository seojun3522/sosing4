            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .toast-slide-in {

        }
        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }

        } = Icons;

        // --- 재사용 가능한 포맷팅 함수 분리 ---
        const formatDateTime = (timestamp) => {
            if (!timestamp) return { date: '날짜모름', time: '' };
            const dObj = new Date(timestamp);
            if (isNaN(dObj.getTime())) return { date: '날짜모름', time: '' };
            const y = String(dObj.getFullYear()).slice(-2);
            const m = String(dObj.getMonth() + 1).padStart(2, '0');
            const d = String(dObj.getDate()).padStart(2, '0');
            const hh = String(dObj.getHours()).padStart(2, '0');
            const mm = String(dObj.getMinutes()).padStart(2, '0');
            return { date: `${y}-${m}-${d}`, time: `${hh}:${mm}` };
        };

        const readFileAsDataUrl = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(reader.error);
            reader.readAsDataURL(file);
        });

        const optimizeImageFile = async (file) => {
            const originalDataUrl = await readFileAsDataUrl(file);
            try {
                const bitmap = await createImageBitmap(file);
                const scale = Math.min(1, IMAGE_MAX_SIDE / Math.max(bitmap.width, bitmap.height));
                const canvas = document.createElement('canvas');
                canvas.width = Math.max(1, Math.round(bitmap.width * scale));
                canvas.height = Math.max(1, Math.round(bitmap.height * scale));
                const context = canvas.getContext('2d', { alpha: false });
                context.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
                bitmap.close();

                const optimizedDataUrl = canvas.toDataURL('image/webp', IMAGE_WEBP_QUALITY);
                return optimizedDataUrl.length < originalDataUrl.length ? optimizedDataUrl : originalDataUrl;
            } catch (error) {
                console.warn("이미지 최적화를 건너뜁니다:", error);
                return originalDataUrl;
            }
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, errorInfo: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, errorInfo: error.toString() }; }
            render() {
                if (this.state.hasError) return <div className="p-10 text-center text-red-500 font-bold">오류가 발생했습니다: {this.state.errorInfo}<br/>새로고침 해주세요.</div>;
                return this.props.children;
            }
        }

            let bgClass = "bg-gray-100 text-gray-300";

        const CurrencyCalculatorSidebar = ({ exchangeRate, onRateChange, userRole }) => {
            const [cny, setCny] = useState('');

            )
        }

        const LoginScreen = ({ onLogin }) => {
            const [inputPw, setInputPw] = useState("");
            const [error, setError] = useState(false);
            const [loading, setLoading] = useState(true);
            const [serverPasswords, setServerPasswords] = useState({ master: DEFAULT_MASTER_PW, memberPasswords: {} });

            useEffect(() => {
                const initAndFetch = async () => {
                    try {
                        const [secRes, globRes] = await Promise.all([
                            supabase.from('security_settings').select('*').eq('id', 1).single(),
                            supabase.from('global_settings').select('teamMembers').eq('id', 1).single()
                        ]);
                        
                        if (secRes.data) {
                            const activeMembers = globRes.data?.teamMembers || [];
                            const activeKeys = activeMembers.map(m => m.key);
                            
                            const validPasswords = {};
                            const rawPasswords = secRes.data.memberPasswords || {};
                            
                            Object.keys(rawPasswords).forEach(k => {
                                if (activeKeys.includes(k)) {
                                    validPasswords[k] = rawPasswords[k];
                                }
                            });

                            setServerPasswords({ master: secRes.data.master || DEFAULT_MASTER_PW, memberPasswords: validPasswords });
                        }
                    } catch (e) { console.error(e); } finally { setLoading(false); }
                };
                initAndFetch();
            }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (inputPw === serverPasswords.master) onLogin('admin', 'master');
                else {
                    const memberKey = Object.keys(serverPasswords.memberPasswords).find(key => serverPasswords.memberPasswords[key] === inputPw && inputPw.trim() !== "");
                    if (memberKey) onLogin('member', memberKey);
                    else if (inputPw === "5678") onLogin('member', 'guest');
                    else { setError(true); setInputPw(""); }
                }
            };

            if (loading) return <div className="fixed inset-0 flex items-center justify-center bg-white"><div className="spinner"></div></div>;

            return (
                <div className="fixed inset-0 bg-slate-100 flex items-center justify-center z-[9999] p-4 font-bold">
                    <div className="bg-white w-full max-w-sm rounded-2xl shadow-xl p-8 border border-slate-200">

                            <p className="text-sm text-slate-500 mt-2">비밀번호를 입력하세요.</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input type="password" value={inputPw} onChange={(e) => { setInputPw(e.target.value); setError(false); }} className={`w-full p-4 text-center text-lg tracking-widest font-black border-2 rounded-xl focus:outline-none transition-all ${error ? 'border-red-300 bg-red-50' : 'border-slate-200 focus:border-indigo-500 bg-slate-50'}`} placeholder="●●●●" autoFocus />
                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl shadow-lg transition-transform active:scale-95">입장하기</button>
                        </form>
                    </div>
                </div>
            );
        };

            const [projs, setProjs] = useState([...(currentProjects || [])]);
            const [team, setTeam] = useState([...(currentTeam || [])]);
            const [masterPw, setMasterPw] = useState(currentSecurity?.master || DEFAULT_MASTER_PW);
            const [memberPwMap, setMemberPwMap] = useState(currentSecurity?.memberPasswords || {});

            const handleSave = () => {
                const cleanMemberPwMap = {};
                team.forEach(m => {
                    if (memberPwMap[m.key] !== undefined) {
                        cleanMemberPwMap[m.key] = memberPwMap[m.key];
                    }
                });
                onSave(projs, team, { master: masterPw, memberPasswords: cleanMemberPwMap });
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4 font-bold">
                    <div className="bg-white rounded-2xl w-full max-w-2xl p-6 shadow-xl flex flex-col h-[600px]">
                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                            <h3 className="text-xl font-black uppercase text-indigo-900 flex items-center gap-2"><Settings className="w-6 h-6"/>시스템 설정</h3>
                            <button onClick={onClose}><X className="w-6 h-6"/></button>
                        </div>
                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-8">
                            <section className="bg-red-50 p-4 rounded-xl border border-red-100 font-black">
                                <label className="text-xs font-black text-red-600 uppercase mb-2 block">관리자 암호</label>
                                <input type="text" value={masterPw} onChange={(e) => setMasterPw(e.target.value)} className="w-full border border-red-200 rounded-lg p-2 text-sm font-black"/>
                            </section>
                            <section className="font-black">
                                <label className="text-xs font-black text-gray-400 uppercase mb-2 block border-b pb-1">팀원 관리 (팀별 개별암호)</label>
                                <p className="text-[10px] text-red-500 mt-1 mb-4">※ 로그인 오류 방지를 위해 팀원별 암호는 반드시 다르게 설정하세요.</p>
                                <div className="space-y-2">
                                    {team.map((m, i) => (
                                        <div key={i} className="flex gap-2 items-center">
                                            <input value={m.label} onChange={(e) => { const n = [...team]; n[i].label = e.target.value; setTeam(n); }} className="flex-1 border rounded-lg p-2 text-sm font-black" placeholder="이름" />
                                            <input value={memberPwMap[m.key] || ''} onChange={(e) => setMemberPwMap({...memberPwMap, [m.key]: e.target.value})} className="w-24 border rounded-lg p-2 text-sm font-mono font-black" placeholder="암호" />
                                            <label className="flex items-center gap-1 text-xs text-gray-500 cursor-pointer whitespace-nowrap ml-1">
                                                <input type="checkbox" checked={m.isConfirmedOnly || false} onChange={(e) => { const n = [...team]; n[i].isConfirmedOnly = e.target.checked; setTeam(n); }} className="w-4 h-4 accent-indigo-600" />
                                                확정만 보기
                                            </label>
                                            <button onClick={() => setTeam(team.filter((_, idx) => idx !== i))} className="text-red-400 ml-2"><Trash2 className="w-4 h-4"/></button>
                                        </div>
                                    ))}
                                    <button onClick={() => setTeam([...team, { key: `member_${Date.now()}`, label: "새 팀원", isConfirmedOnly: false }])} className="w-full py-2 border-2 border-dashed border-gray-200 rounded-lg text-xs text-gray-400 font-black">+ 팀원 추가</button>
                                </div>
                            </section>
                            <section className="font-black">
                                <label className="text-xs font-black text-gray-400 uppercase mb-4 block border-b pb-1">프로젝트 관리</label>
                                <div className="space-y-2">
                                    {projs.map((p, i) => (
                                        <div key={i} className="flex items-center gap-2">
                                            <input value={p} onChange={(e) => { const n = [...projs]; n[i] = e.target.value; setProjs(n); }} className="flex-1 border rounded-lg p-2 text-sm font-black" />
                                            <button onClick={() => setProjs(projs.filter((_, idx) => idx !== i))} className="text-red-400"><Trash2 className="w-4 h-4"/></button>
                                        </div>
                                    ))}
                                    <button onClick={() => setProjs([...projs, "새 프로젝트"])} className="w-full py-2 border-2 border-dashed border-gray-200 rounded-lg text-xs text-gray-400 font-black">+ 프로젝트 추가</button>
                                </div>
                            </section>
                        </div>
                        <div className="flex gap-4 mt-6 pt-4 border-t">
                            <button onClick={onClose} className="flex-1 bg-gray-100 py-3 rounded-xl font-black">취소</button>
                            <button onClick={handleSave} className="flex-2 grow-[2] bg-indigo-600 text-white py-3 rounded-xl shadow-lg font-black">설정 저장</button>
                        </div>
                    </div>
                </div>
            );
        };

        const CategorySettingsModal = ({ currentGroups, currentFees, currentRatios, onClose, onSave }) => {
            const [groups, setGroups] = useState(JSON.parse(JSON.stringify(currentGroups || [])));
            const [fees, setFees] = useState({ ...(currentFees || {}) });
            const [ratios, setRatios] = useState({ ...(currentRatios || {}) });

            const moveGroup = (index, direction) => {
                if ((direction === 'up' || direction === 'top') && index === 0) return;
                if ((direction === 'down' || direction === 'bottom') && index === groups.length - 1) return;
                const newGroups = [...groups];
                const item = newGroups.splice(index, 1)[0];
                if (direction === 'up') newGroups.splice(index - 1, 0, item);
                else if (direction === 'down') newGroups.splice(index + 1, 0, item);
                else if (direction === 'top') newGroups.unshift(item);
                else if (direction === 'bottom') newGroups.push(item);
                setGroups(newGroups);
            };

            const moveSubCat = (groupIndex, subIndex, direction) => {
                const newGroups = [...groups];
                const subs = newGroups[groupIndex].subs;
                if ((direction === 'up' || direction === 'top') && subIndex === 0) return;
                if ((direction === 'down' || direction === 'bottom') && subIndex === subs.length - 1) return;
                const item = subs.splice(subIndex, 1)[0];
                if (direction === 'up') subs.splice(subIndex - 1, 0, item);
                else if (direction === 'down') subs.splice(subIndex + 1, 0, item);
                else if (direction === 'top') subs.unshift(item);
                else if (direction === 'bottom') subs.push(item);
                setGroups(newGroups);
            };

            const updateSubName = (gIdx, sIdx, oldVal, newVal) => {
                const newGroups = [...groups];
                newGroups[gIdx].subs[sIdx] = newVal;
                setGroups(newGroups);
                if (oldVal !== newVal) {
                    const newFees = { ...fees };
                    const newRatios = { ...ratios };
                    if (newFees[oldVal] !== undefined) { newFees[newVal] = newFees[oldVal]; delete newFees[oldVal]; }
                    if (newRatios[oldVal] !== undefined) { newRatios[newVal] = newRatios[oldVal]; delete newRatios[oldVal]; }
                    setFees(newFees);
                    setRatios(newRatios);
                }
            };

            const handleSave = (bulk) => onSave(groups, fees, ratios, bulk);

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4 font-bold">
                    <div className="bg-white rounded-2xl w-full max-w-4xl p-6 shadow-xl flex flex-col h-[80vh]">
                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                            <h3 className="text-xl font-black uppercase text-indigo-900 flex items-center gap-2 font-black"><FolderTree className="w-6 h-6"/>카테고리 및 원가공식</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><X className="w-6 h-6"/></button>
                        </div>
                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-6">
                            {groups.map((g, gIdx) => (
                                <div key={gIdx} className="bg-gray-50 p-4 rounded-xl border">
                                    <div className="flex items-center gap-3 mb-4 font-black">
                                        <div className="flex items-center gap-1 opacity-40 hover:opacity-100 font-bold transition-opacity bg-gray-200/50 p-1 rounded-md">
                                            <button onClick={() => moveGroup(gIdx, 'top')} className="hover:text-indigo-600 p-0.5" title="최상단으로"><ChevronsUp className="w-4 h-4"/></button>
                                            <button onClick={() => moveGroup(gIdx, 'up')} className="hover:text-indigo-500 p-0.5" title="위로"><ChevronUp className="w-4 h-4"/></button>
                                            <button onClick={() => moveGroup(gIdx, 'down')} className="hover:text-indigo-500 p-0.5" title="아래로"><ChevronDown className="w-4 h-4"/></button>
                                            <button onClick={() => moveGroup(gIdx, 'bottom')} className="hover:text-indigo-600 p-0.5" title="최하단으로"><ChevronsDown className="w-4 h-4"/></button>
                                        </div>
                                        <Layers className="w-5 h-5 text-indigo-600 flex-shrink-0 ml-1" />
                                        <input value={g.main} onChange={(e) => { const n = [...groups]; n[gIdx].main = e.target.value; setGroups(n); }} className="bg-transparent font-black text-indigo-900 text-lg outline-none flex-1 border-b border-transparent focus:border-indigo-200" placeholder="대분류명" />
                                        <button onClick={() => setGroups(groups.filter((_, i) => i !== gIdx))} className="text-red-300 ml-auto font-black bg-white hover:text-red-500 p-1.5 rounded transition-colors"><Trash2 className="w-5 h-5"/></button>
                                    </div>
                                    <div className="space-y-2 pl-8">
                                        {g.subs.map((sub, sIdx) => (
                                            <div key={sIdx} className="flex items-center gap-4 bg-white p-2 rounded border text-xs font-black group shadow-sm hover:border-indigo-200 transition-colors">
                                                <div className="flex items-center gap-1 opacity-30 group-hover:opacity-100 font-bold transition-opacity bg-gray-100 p-1 rounded-md">
                                                    <button onClick={() => moveSubCat(gIdx, sIdx, 'top')} className="hover:text-indigo-600 p-0.5" title="최상단으로"><ChevronsUp className="w-3 h-3"/></button>
                                                    <button onClick={() => moveSubCat(gIdx, sIdx, 'up')} className="hover:text-indigo-500 p-0.5" title="위로"><ChevronUp className="w-3 h-3"/></button>
                                                    <button onClick={() => moveSubCat(gIdx, sIdx, 'down')} className="hover:text-indigo-500 p-0.5" title="아래로"><ChevronDown className="w-3 h-3"/></button>
                                                    <button onClick={() => moveSubCat(gIdx, sIdx, 'bottom')} className="hover:text-indigo-600 p-0.5" title="최하단으로"><ChevronsDown className="w-3 h-3"/></button>
                                                </div>
                                                <input value={sub} onChange={(e) => updateSubName(gIdx, sIdx, sub, e.target.value)} className="w-32 border border-gray-200 focus:border-indigo-400 rounded p-1.5 font-black outline-none ml-1" placeholder="소분류명" />
                                                <div className="flex items-center gap-1 font-black">
                                                    <span className="text-gray-500 text-[10px]">배율:</span>
                                                    <input type="number" step="0.01" value={ratios[sub] || 1} onChange={(e) => setRatios({...ratios, [sub]: Number(e.target.value)})} className="w-16 border border-gray-200 rounded px-1.5 py-1 font-black outline-none focus:border-amber-400 text-amber-700"/>
                                                </div>
                                                <div className="flex items-center gap-1 font-black">
                                                    <span className="text-gray-500 text-[10px]">고정비:</span>
                                                    <input type="number" value={fees[sub] || 0} onChange={(e) => setFees({...fees, [sub]: Number(e.target.value)})} className="w-24 border border-gray-200 rounded px-1.5 py-1 font-black outline-none focus:border-indigo-400 text-indigo-700"/>
                                                </div>
                                                <div className="flex-1"></div>
                                                <button onClick={() => { const n = [...groups]; n[gIdx].subs.splice(sIdx, 1); setGroups(n); }} className="text-gray-300 font-black hover:text-red-500 transition-colors"><X className="w-4 h-4"/></button>
                                            </div>
                                        ))}
                                        <button onClick={() => { const n = [...groups]; n[gIdx].subs.push("새 소분류"); setGroups(n); }} className="w-full py-2 border-2 border-dashed border-gray-200 bg-white rounded-xl text-[10px] text-gray-400 font-black hover:border-indigo-400 hover:text-indigo-500 transition-all">+ 소분류 추가</button>
                                    </div>
                                </div>
                            ))}
                            <button onClick={() => setGroups([...groups, { main: "새 대분류", subs: [] }])} className="w-full py-4 border-2 border-dashed border-indigo-200 text-indigo-500 bg-indigo-50/50 rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-indigo-100 transition-all"><Plus className="w-5 h-5"/> 대분류 추가</button>
                        </div>
                        <div className="flex flex-col gap-3 mt-6 pt-4 border-t font-black">
                            <button onClick={() => handleSave(true)} className="w-full bg-amber-500 text-white py-3 rounded-lg text-sm font-black shadow hover:bg-amber-600 transition-colors flex justify-center items-center gap-2">
                                <RefreshCw className="w-4 h-4" /> 현재 수정한 공식을 기존 상품들에 일괄 적용
                            </button>
                            <div className="flex gap-4">
                                <button onClick={onClose} className="flex-1 bg-gray-100 py-3 rounded-xl font-black text-gray-500 hover:bg-gray-200">취소</button>
                                <button onClick={() => handleSave(false)} className="flex-2 grow-[2] bg-indigo-600 text-white py-3 rounded-xl shadow-lg font-black hover:bg-indigo-700">설정만 저장</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const InlineComments = ({ productId, comments, userKey, userRole, teamMembers, onCommentAdded, onCommentDeleted }) => {
            const [text, setText] = useState("");
            const [isSaving, setIsSaving] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [comments]);

            const handleAdd = async (e) => {
                e.preventDefault();
                if(!text.trim()) return;
                const member = teamMembers && teamMembers.find(m => m.key === userKey);
                const userName = member ? member.label : (userRole === 'admin' ? 'Master' : 'Guest');

                setIsSaving(true);
                try {
                    const { data, error } = await supabase.from('comments').insert([{
                        productId,
                        userId: userKey,
                        userName,
                        text: text.trim(),
                        createdAt: Date.now()
                    }]).select().single();

                    if (error) throw error;
                    if (data) onCommentAdded(data);
                    setText("");
                } catch (error) {
                    alert("댓글 저장에 실패했습니다: " + error.message);
                } finally {
                    setIsSaving(false);
                }
            };

            const handleDelete = async (id) => {
                if(confirm("댓글을 삭제하시겠습니까?")) {
                    const { error } = await supabase.from('comments').delete().eq('id', id);
                    if (error) {
                        alert("댓글 삭제에 실패했습니다: " + error.message);
                    } else {
                        onCommentDeleted(id);
                    }
                }
            };

            return (
                <div className="flex flex-col gap-1 h-32 border border-gray-200 rounded-xl bg-gray-50 overflow-hidden relative shadow-inner">
                    <div ref={scrollRef} className="flex-1 overflow-y-auto p-2 space-y-2 custom-scrollbar text-[11px] font-black">
                        {(!comments || comments.length === 0) && <div className="text-gray-400 text-center mt-6 text-[10px]">의견이 없습니다.</div>}
                        {(comments || []).map(c => (
                            <div key={c.id} className={`flex flex-col ${c.userId === userKey ? 'items-end' : 'items-start'}`}>
                                <div className="flex items-center gap-1 mb-0.5">
                                    <span className="text-[10px] text-gray-500">{c.userName}</span>
                                    <span className="text-[8px] text-gray-400 font-mono">{new Date(c.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                </div>
                                <div className={`relative group px-2 py-1.5 rounded-lg max-w-[90%] break-words shadow-sm ${c.userId === userKey ? 'bg-indigo-100 text-indigo-900 rounded-tr-none' : 'bg-white border text-gray-800 rounded-tl-none'}`}>
                                    {c.text}
                                    {(c.userId === userKey || userRole === 'admin') && (
                                        <button onClick={() => handleDelete(c.id)} className="absolute -left-5 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition-opacity"><Trash2 className="w-3 h-3"/></button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                    <form onSubmit={handleAdd} className="flex border-t bg-white">
                        <input type="text" value={text} onChange={e=>setText(e.target.value)} placeholder="의견 남기기..." disabled={isSaving} className="flex-1 px-2 py-1.5 outline-none text-[11px] bg-transparent font-black disabled:opacity-50"/>
                        <button type="submit" disabled={isSaving || !text.trim()} className="p-1.5 text-indigo-600 hover:bg-indigo-50 transition-colors disabled:opacity-30"><Send className="w-4 h-4"/></button>
                    </form>
                </div>
            )
        };

        // --- 성능 개선 핵심 컴포넌트: 전체 리렌더링을 막기 위한 Row 분리 및 Memoization ---
        const ProductTableRow = React.memo(({ 
            item, idx, isSelected, isEditingNo, editingNoValue, 
            userRole, userKey, sortConfig, imageMapData, comments, settings,
            onSelectItem, onSetEditingNoValue, onSubmitNewNo, onStartEditingNo,
            onMoveOrder, onOpenPreview, onToggleFinalize, onToggleConfirm,
            onToggleSample, onToggleHold, onSetEditingItem, onSetProductForm,
            onSetIsAddModalOpen, onToggleStatus, onToggleDelete, onRequestImage,
            onCommentAdded, onCommentDeleted, showToast
        }) => {
            const rowRef = useRef(null);

            useEffect(() => {
                if (imageMapData) return;
                const target = rowRef.current;
                if (!target) return;

                if (!('IntersectionObserver' in window)) {
                    onRequestImage(item.id);
                    return;
                }

                const observer = new IntersectionObserver((entries) => {
                    if (entries.some(entry => entry.isIntersecting)) {
                        onRequestImage(item.id);
                        observer.disconnect();
                    }
                }, { rootMargin: '500px 0px' });

                observer.observe(target);
                return () => observer.disconnect();
            }, [item.id, imageMapData, onRequestImage]);

            return (
                <tr ref={rowRef} className={`hover:bg-gray-50/50 transition-colors ${item.isFinalized ? 'bg-red-50/40' : item.isConfirmed ? 'bg-green-50/30' : item.isHeld ? 'bg-amber-50/30' : ''} ${isSelected ? 'bg-blue-50/30' : ''}`}>
                    {userRole === 'admin' && (
                        <td className="px-4 py-4 text-center align-middle">
                            <input type="checkbox" checked={isSelected} onChange={() => onSelectItem(item.id)} className="w-4 h-4 accent-indigo-600 cursor-pointer"/>
                        </td>
                    )}
                    <td className="px-2 py-4 text-center font-black align-middle">
                        {isEditingNo ? (
                            <input type="number" value={editingNoValue} onChange={(e) => onSetEditingNoValue(e.target.value)} onBlur={() => onSubmitNewNo(item, idx)} onKeyDown={(e) => { if (e.key === 'Enter') onSubmitNewNo(item, idx); else if (e.key === 'Escape') onSetEditingNoValue(null); }} className="w-12 text-center border-2 border-indigo-400 rounded outline-none text-indigo-700 py-1" autoFocus />
                        ) : (
                            <div onClick={() => { if (userRole === 'admin') onStartEditingNo(item, idx + 1); else showToast("팀원은 순서를 변경할 수 없습니다.", "error"); }} className={`inline-block px-2 py-1.5 rounded font-mono text-sm transition-all ${userRole === 'admin' && sortConfig.key === 'customOrder' ? 'cursor-pointer text-indigo-600 bg-indigo-50 hover:bg-indigo-100 hover:scale-110 border border-indigo-100 shadow-sm' : 'text-gray-400'}`} title="숫자를 클릭하여 원하는 순서로 즉시 이동">
                                {idx + 1}
                            </div>
                        )}
                    </td>
                    <td className="px-2 py-4 text-center align-middle">
                        {userRole === 'admin' && sortConfig.key === 'customOrder' && sortConfig.direction === 'asc' ? (
                            <div className="flex flex-col items-center justify-center gap-1">
                                <button onClick={() => onMoveOrder(idx, 'up')} disabled={idx === 0} className="w-7 h-7 flex items-center justify-center bg-gray-100 rounded-md hover:bg-indigo-100 hover:text-indigo-600 disabled:opacity-20 transition-all shadow-sm border"><ChevronUp className="w-4 h-4" /></button>
                                <button onClick={() => onMoveOrder(idx, 'down')} className="w-7 h-7 flex items-center justify-center bg-gray-100 rounded-md hover:bg-indigo-100 hover:text-indigo-600 disabled:opacity-20 transition-all shadow-sm border"><ChevronDown className="w-4 h-4" /></button>
                            </div>
                        ) : <span className="text-[10px] text-gray-300">-</span>}
                    </td>
                    
                    <td className="px-2 py-4 pl-6 align-middle">
                        <div className="flex items-center justify-center gap-2">
                            {imageMapData ? (
                                <React.Fragment>
                                    <div className="w-16 h-16 bg-gray-50 rounded-lg flex flex-col items-center justify-center overflow-hidden border cursor-pointer relative group shadow-inner flex-shrink-0" onClick={() => onOpenPreview(item, 0)} title="대표 이미지">
                                        {imageMapData.image ? <img src={imageMapData.image} loading="lazy" decoding="async" className="absolute inset-0 w-full h-full object-cover" /> : <ImageIcon className="w-6 h-6 text-gray-200"/>}
                                        <div className="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all z-10"><ZoomIn className="text-white w-5 h-5"/></div>
                                    </div>
                                    {imageMapData.optionImage && (
                                        <div className="w-16 h-16 bg-amber-50 rounded-lg flex items-center justify-center overflow-hidden border border-amber-200 cursor-pointer relative group shadow-inner flex-shrink-0" onClick={() => onOpenPreview(item, 1)} title="옵션 이미지">
                                            <img src={imageMapData.optionImage} loading="lazy" decoding="async" className="absolute inset-0 w-full h-full object-cover" />
                                            <div className="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all z-10"><ZoomIn className="text-white w-5 h-5"/></div>
                                            <div className="absolute bottom-0 inset-x-0 bg-black/60 text-white text-[9px] text-center font-black py-0.5 z-10">옵션</div>
                                        </div>
                                    )}
                                </React.Fragment>
                            ) : (
                                <div className="w-16 h-16 bg-gray-50 border border-gray-200 rounded-xl flex flex-col items-center justify-center shadow-sm relative flex-shrink-0">
                                    <div className="w-4 h-4 border-2 border-gray-200 border-t-indigo-500 rounded-full animate-spin mb-1"></div>
                                    <span className="text-[7px] text-gray-400 font-bold">로딩중</span>
                                </div>
                            )}
                        </div>
                    </td>
                    <td className="px-6 py-4 min-w-[200px] align-middle">
                        <div className="flex flex-col gap-0.5">
                            <div className="flex items-center gap-1.5 mb-1">
                                <span className="text-[9px] bg-indigo-50 text-indigo-500 px-1.5 py-0.5 rounded border border-indigo-100">{item.project}</span>
                                <span className="text-[9px] text-gray-400">{(item.mainCategory || "미분류")} &gt; {(item.category || "미지정")}</span>
                            </div>
                            <div className="text-gray-900 line-clamp-1 flex items-center gap-2 text-base">
                                <span className="text-[9px] text-gray-400 font-mono border border-gray-200 px-1 rounded bg-gray-50">#{item.itemCode || item.id.slice(-6).toUpperCase()}</span>
                                {item.name}
                            </div>
                            <div className="text-xs text-gray-400 italic line-clamp-1 mt-1">{item.option || '옵션없음'}</div>
                            <div className="flex gap-1.5 mt-2">
                                {(item.links || []).filter(l => l).map((l, i) => <a key={i} href={l} target="_blank" className="bg-orange-50 text-orange-600 text-[9px] px-1.5 py-0.5 rounded border border-orange-100 hover:bg-orange-100 transition-colors">소싱 #{i+1}</a>)}
                                {(item.naverLinks || []).filter(l => l).map((l, i) => <a key={i} href={l} target="_blank" className="bg-green-50 text-green-600 text-[9px] px-1.5 py-0.5 rounded border border-green-100 hover:bg-green-100 transition-colors">경쟁 #{i+1}</a>)}
                            </div>
                        </div>
                    </td>

                    <td className="px-3 py-4 align-middle">
                        <div className="grid grid-cols-2 gap-1.5 w-max mx-auto">
                            {userRole === 'admin' ? (
                                <>
                                    <button onClick={() => onToggleFinalize(item)} className={`w-full px-2 py-1.5 flex items-center justify-center gap-1 text-[11px] rounded-lg transition-all ${item.isFinalized ? 'bg-red-600 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`} title="확정"><Flag className="w-3 h-3"/> 확정</button>
                                    <button onClick={() => onToggleConfirm(item)} className={`w-full px-2 py-1.5 flex items-center justify-center gap-1 text-[11px] rounded-lg transition-all ${item.isConfirmed ? 'bg-green-600 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`} title="선택"><CheckCircle className="w-3 h-3"/> 선택</button>
                                    <button onClick={() => onToggleSample(item)} className={`w-full px-2 py-1.5 flex items-center justify-center gap-1 text-[11px] rounded-lg transition-all ${item.isSampleRequested ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`} title="샘플신청"><Truck className="w-3 h-3"/> 샘플</button>
                                    <button onClick={() => onToggleHold(item)} className={`w-full px-2 py-1.5 flex items-center justify-center gap-1 text-[11px] rounded-lg transition-all ${item.isHeld ? 'bg-amber-50/30 text-amber-500 border border-amber-200' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`} title="보류"><Clock className="w-3 h-3"/> 보류</button>
                                    <button onClick={() => { const imgData = imageMapData || {}; const fullItem = { ...item, image: imgData.image, optionImage: imgData.optionImage }; onSetEditingItem(fullItem); onSetProductForm({ ...fullItem, links: fullItem.links || [''], naverLinks: fullItem.naverLinks || [''] }); onSetIsAddModalOpen(true); }} className="w-full px-2 py-1.5 flex items-center justify-center gap-1 text-[11px] text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all" title="수정"><Edit2 className="w-3 h-3"/> 수정</button>
                                    <button onClick={() => onToggleDelete(item)} className="w-full px-2 py-1.5 flex items-center justify-center gap-1 text-[11px] text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all" title="삭제"><Trash2 className="w-3 h-3"/> 삭제</button>
                                </>
                            ) : (
                                <>
                                    {item.isFinalized && <span className="w-full px-2 py-1.5 flex items-center justify-center gap-1 text-[11px] rounded-lg bg-red-100 text-red-700 border border-red-200"><Flag className="w-3 h-3"/> 확정</span>}
                                    {item.isConfirmed && <span className="w-full px-2 py-1.5 flex items-center justify-center gap-1 text-[11px] rounded-lg bg-green-100 text-green-700 border border-green-200"><CheckCircle className="w-3 h-3"/> 선택</span>}
                                    <button onClick={() => onToggleSample(item)} className={`w-full px-2 py-1.5 flex items-center justify-center gap-1 text-[11px] rounded-lg transition-all ${item.isSampleRequested ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`} title="샘플신청"><Truck className="w-3 h-3"/> 샘플</button>
                                    
                                    {item.isHeld && <span className="w-full px-2 py-1.5 flex items-center justify-center gap-1 text-[11px] rounded-lg bg-amber-100 text-amber-700 border border-amber-200"><Clock className="w-3 h-3"/> 보류</span>}
                                    
                                    {!item.isConfirmed && !item.isFinalized && !item.isHeld && !item.isSampleRequested && <span className="w-full text-[11px] text-gray-400 px-2 py-1.5 flex items-center justify-center col-span-2">진행중</span>}
                                </>
                            )}
                        </div>
                    </td>

                    <td className="px-4 py-4 w-72 min-w-[280px] align-middle bg-gray-50/30 border-r border-gray-100">
                        <InlineComments 
                            productId={item.id}
                            comments={comments}
                            userKey={userKey}
                            userRole={userRole}
                            teamMembers={settings.teamMembers}
                            onCommentAdded={onCommentAdded}
                            onCommentDeleted={onCommentDeleted}
                        />
                    </td>

                    <td className="px-4 py-4 text-center align-middle">
                        {(() => {
                            const dt = formatDateTime(item.createdAt);
                            return <div className="flex flex-col items-center justify-center gap-1"><span className="text-[15px] text-gray-800 tracking-wider">{dt.date}</span><span className="text-xs text-gray-500 font-mono">{dt.time}</span></div>;
                        })()}
                    </td>
                    <td className="px-4 py-4 text-center align-middle">
                        {(() => {
                            const dt = formatDateTime(item.updatedAt || item.createdAt);
                            return <div className="flex flex-col items-center justify-center gap-1"><span className="text-[15px] text-gray-800 tracking-wider">{dt.date}</span><span className="text-xs text-gray-500 font-mono">{dt.time}</span></div>;
                        })()}
                    </td>
                    <td className="px-4 py-4 text-right align-middle">
                        <div className="text-orange-600 font-mono text-base">{item.cny || 0} ¥</div>
                    </td>
                    <td className="px-4 py-4 text-right align-middle">
                        <div className="text-gray-600 font-mono text-base">{item.cost?.toLocaleString()}원</div>
                    </td>
                    <td className="px-4 py-4 text-right align-middle">
                        <div className="text-indigo-600 font-mono text-lg">{item.price?.toLocaleString()}원</div>
                    </td>
                    <td className="px-4 py-4 text-right align-middle pr-6">
                        <div className="font-mono text-gray-800 text-base">{(item.price - item.cost)?.toLocaleString()}원</div>
                        <div className="text-[11px] text-gray-400 font-mono mt-1">({item.price ? (((item.price - item.cost) / item.price) * 100).toFixed(1) : 0}%)</div>
                    </td>

                    {(settings.teamMembers || []).map((m, i) => (
                        <td key={m.key} className={`px-3 py-4 text-center align-middle bg-gray-50/50 ${i === 0 ? 'border-l border-gray-100' : ''}`}>
                            <StatusButton status={item.approvals?.[m.key] || 'pending'} onClick={() => { if (userRole === 'admin' || userKey === m.key) onToggleStatus(item, m.key); else showToast("본인 이름의 항목만 체크할 수 있습니다.", "error"); }} />
                        </td>
                    ))}
                </tr>
            );
        }, (prev, next) => {
            // 변경이 없을 때 리렌더링을 차단하여 버벅임 완벽 해소
            return (
                prev.item === next.item &&
                prev.isSelected === next.isSelected &&
                prev.isEditingNo === next.isEditingNo &&
                prev.editingNoValue === next.editingNoValue &&
                prev.idx === next.idx &&
                prev.sortConfig.key === next.sortConfig.key &&
                prev.sortConfig.direction === next.sortConfig.direction &&
                prev.imageMapData === next.imageMapData &&
                prev.comments === next.comments &&
                prev.settings === next.settings
            );
        });

        function App({ userRole, userKey }) {
            const [activeMainCategory, setActiveMainCategory] = useState("전체");
            const [activeCategory, setActiveCategory] = useState("전체");
            const [expandedMainCats, setExpandedMainCats] = useState({});
            const [activeProject, setActiveProject] = useState("전체");
            const [searchTerm, setSearchTerm] = useState("");
            const [filterStatus, setFilterStatus] = useState("all"); 
            const [currentPage, setCurrentPage] = useState(1);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isBulkModalOpen, setIsBulkModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [isSystemSettingsOpen, setIsSystemSettingsOpen] = useState(false);
            const [isCategorySettingsOpen, setIsCategorySettingsOpen] = useState(false);
            const [isTrashModalOpen, setIsTrashModalOpen] = useState(false);
            const [toast, setToast] = useState(null);

            // 이미지 지연 로딩을 위한 새로운 상태
            const [imageMap, setImageMap] = useState({});
            const [imageLoadingProgress, setImageLoadingProgress] = useState(null);
            const [imageOptimizationProgress, setImageOptimizationProgress] = useState(null);

            // Preview Carousel State
            const [previewData, setPreviewData] = useState(null);
            const [previewIndex, setPreviewIndex] = useState(0);

            const [editingNoId, setEditingNoId] = useState(null);
            const [editingNoValue, setEditingNoValue] = useState("");
            const [selectedItems, setSelectedItems] = useState([]);
            const [isBulkMoveModalOpen, setIsBulkMoveModalOpen] = useState(false);
            const [bulkMoveTarget, setBulkMoveTarget] = useState({ project: '', mainCategory: '', category: '' });
            const fileInputRef = useRef(null);
            const imageRequestQueueRef = useRef(new Set());
            const requestedImageIdsRef = useRef(new Set());
            const imageBatchTimerRef = useRef(null);
            const productsRef = useRef([]);
            const refreshProductsRef = useRef(null);
            
            const [products, setProducts] = useState([]);
            const [settings, setSettings] = useState({ categoryGroups: [], categoryFees: {}, categoryRatios: {}, projects: [], teamMembers: [], exchangeRate: 195 });
            const [security, setSecurity] = useState({ master: DEFAULT_MASTER_PW, memberPasswords: {} });
            
            const [productForm, setProductForm] = useState({ project: '', mainCategory: '', category: '', name: '', option: '', cost: '', price: '', image: null, optionImage: null, cny: '', links: [''], naverLinks: [''] });
            const [lastTargetZone, setLastTargetZone] = useState('main');
            const [sortConfig, setSortConfig] = useState({ key: 'customOrder', direction: 'asc' });

            const [allComments, setAllComments] = useState([]);

            // 강제 로그아웃 로직
            useEffect(() => {
                if (userRole === 'member' && userKey && userKey !== 'guest') {
                    if (settings.teamMembers && settings.teamMembers.length > 0) {
                        const stillExists = settings.teamMembers.find(m => m.key === userKey);
                        if (!stillExists) {
                            alert("계정 정보가 갱신되어 자동으로 로그아웃됩니다. 다시 로그인해주세요.");
                            sessionStorage.removeItem('team_role');
                            sessionStorage.removeItem('team_user_key');
                            window.location.reload();
                        }
                    }
                }
            }, [settings.teamMembers, userKey, userRole]);

            useEffect(() => {
                setSelectedItems([]);
                setCurrentPage(1);
            }, [activeProject, activeMainCategory, activeCategory, filterStatus]);

            useEffect(() => {
                setCurrentPage(1);
            }, [searchTerm, sortConfig]);

            const handleSort = (key) => {
                let direction = 'desc';
                if (sortConfig.key === key && sortConfig.direction === 'desc') direction = 'asc';
                if (key === 'customOrder') direction = 'asc';
                setSortConfig({ key, direction });
            };

            const generateItemCode = () => 'PRD-' + Math.random().toString(36).substring(2, 8).toUpperCase();

            useEffect(() => {
                const handlePaste = async (e) => {
                    if (!isAddModalOpen) return;
                    const items = (e.clipboardData || window.clipboardData).items;
                    for (let i = 0; i < items.length; i++) {
                        if (items[i].type.indexOf('image') !== -1) {
                            const blob = items[i].getAsFile();
                            e.preventDefault();
                            try {
                                const optimizedImage = await optimizeImageFile(blob);
                                if (lastTargetZone === 'main') setProductForm(prev => ({ ...prev, image: optimizedImage }));
                                else if (lastTargetZone === 'option') setProductForm(prev => ({ ...prev, optionImage: optimizedImage }));
                            } catch (error) {
                                console.error("이미지 처리 실패:", error);
                            }
                            break;
                        }
                    }
                };
                window.addEventListener('paste', handlePaste);
                return () => window.removeEventListener('paste', handlePaste);
            }, [isAddModalOpen, lastTargetZone]);

            useEffect(() => {
                if (!previewData) return;
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') setPreviewData(null);
                    if (e.key === 'ArrowLeft') setPreviewIndex(p => p === 0 ? previewData.length - 1 : p - 1);
                    if (e.key === 'ArrowRight') setPreviewIndex(p => p === previewData.length - 1 ? 0 : p + 1);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [previewData]);

            const showToast = useCallback((message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            }, []);

            const fetchImagesByIds = useCallback(async (ids, trackProgress = false) => {
                if (!ids.length) return;
                const chunkSize = 15;
                let loadedCount = 0;

                if (trackProgress) setImageLoadingProgress({ current: 0, total: ids.length });

                for (let i = 0; i < ids.length; i += chunkSize) {
                    const chunk = ids.slice(i, i + chunkSize);
                    const { data, error } = await supabase
                        .from('products')
                        .select('id, image, optionImage')
                        .in('id', chunk);

                    if (error) {
                        chunk.forEach(id => requestedImageIdsRef.current.delete(id));
                        throw error;
                    }

                    if (data) {
                        setImageMap(prev => {
                            const next = { ...prev };
                            data.forEach(item => {
                                next[item.id] = { image: item.image, optionImage: item.optionImage };
                            });
                            return next;
                        });
                    }

                    loadedCount += chunk.length;
                    if (trackProgress) setImageLoadingProgress({ current: loadedCount, total: ids.length });
                }

                if (trackProgress) setTimeout(() => setImageLoadingProgress(null), 1000);
            }, []);

            const requestImage = useCallback((id) => {
                if (!id || requestedImageIdsRef.current.has(id)) return;
                requestedImageIdsRef.current.add(id);
                imageRequestQueueRef.current.add(id);

                if (imageBatchTimerRef.current) return;
                imageBatchTimerRef.current = setTimeout(async () => {
                    const ids = Array.from(imageRequestQueueRef.current);
                    imageRequestQueueRef.current.clear();
                    imageBatchTimerRef.current = null;
                    try {
                        await fetchImagesByIds(ids);
                    } catch (error) {
                        console.error("Visible image fetch error:", error);
                    }
                }, 40);
            }, [fetchImagesByIds]);

            useEffect(() => {
                return () => {
                    if (imageBatchTimerRef.current) clearTimeout(imageBatchTimerRef.current);
                };
            }, []);

            useEffect(() => {
                productsRef.current = products;
            }, [products]);

        // Supabase 데이터 패치 및 실시간 구독
        useEffect(() => {
            let active = true;

            const fetchProductMetadata = async (invalidateChangedImages = true) => {
                const { data, error } = await supabase.from('products').select(PRODUCT_METADATA_COLUMNS);
                if (error) throw error;
                if (!active || !data) return;

                let mergedData = data;
                if (productsRef.current.length > 0) {
                    const previousItems = new Map(productsRef.current.map(item => [item.id, item]));
                    const imageRelatedFields = ['project', 'mainCategory', 'category', 'name', 'option', 'cny', 'cost', 'price', 'links', 'naverLinks'];
                    const changedIds = data
                        .filter(item => {
                            if (!invalidateChangedImages) return false;
                            const previous = previousItems.get(item.id);
                            if (!previous || previous.updatedAt === item.updatedAt) return false;
                            return imageRelatedFields.some(field => JSON.stringify(previous[field]) !== JSON.stringify(item[field]));
                        })
                        .map(item => item.id);

                    if (changedIds.length > 0) {
                        changedIds.forEach(id => requestedImageIdsRef.current.delete(id));
                        setImageMap(current => {
                            const next = { ...current };
                            changedIds.forEach(id => delete next[id]);
                            return next;
                        });
                    }

                    mergedData = data.map(item => {
                        const previous = previousItems.get(item.id);
                        return previous && previous.updatedAt === item.updatedAt ? previous : item;
                    });
                }

                productsRef.current = mergedData;
                setProducts(mergedData);
            };

            refreshProductsRef.current = fetchProductMetadata;

            const fetchComments = async () => {
                const { data, error } = await supabase.from('comments').select('*');
                if (error) throw error;
                if (active && data) setAllComments(data);
            };

            const fetchInitialData = async () => {
                try {
                    const [, , globRes, secRes] = await Promise.all([
                        fetchProductMetadata(false),
                        fetchComments(),
                        supabase.from('global_settings').select('*').eq('id', 1).single(),
                        supabase.from('security_settings').select('*').eq('id', 1).single()
                    ]);
                    
                    if (globRes.data) setSettings({
                        categoryGroups: globRes.data.categoryGroups || [],
                        categoryFees: globRes.data.categoryFees || {},
                        categoryRatios: globRes.data.categoryRatios || {},
                        projects: globRes.data.projects || [],
                        teamMembers: globRes.data.teamMembers || [],
                        exchangeRate: globRes.data.exchangeRate || 195
                    });
                    if (secRes.data) setSecurity({
                        master: secRes.data.master || DEFAULT_MASTER_PW,
                        memberPasswords: secRes.data.memberPasswords || {}
                    });
                } catch (error) {
                    console.error("Critical Fetch Error:", error);
                    alert("데이터 통신 중 치명적인 오류가 발생했습니다. 개발자 도구(F12) 콘솔을 확인해주세요.");
                }
            };

            fetchInitialData();
            const productSyncTimer = setInterval(() => {
                fetchProductMetadata().catch(error => console.error("Products Sync Error:", error));
                fetchComments().catch(error => console.error("Comments Sync Error:", error));
            }, 8000);
            const handleFocus = () => {
                fetchProductMetadata().catch(error => console.error("Products Sync Error:", error));
                fetchComments().catch(error => console.error("Comments Sync Error:", error));
            };
            window.addEventListener('focus', handleFocus);

            const channel = supabase.channel('dashboard_changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'comments' }, payload => {
                        if (payload.eventType === 'INSERT') setAllComments(c => c.some(item => item.id === payload.new.id) ? c : [...c, payload.new]);
                        else if (payload.eventType === 'UPDATE') setAllComments(c => c.map(x => x.id === payload.new.id ? payload.new : x));
                        else if (payload.eventType === 'DELETE') setAllComments(c => c.filter(x => x.id !== payload.old.id));
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'global_settings' }, payload => {
                        if (payload.eventType === 'UPDATE' || payload.eventType === 'INSERT') {
                            setSettings({
                                categoryGroups: payload.new.categoryGroups || [],
                                categoryFees: payload.new.categoryFees || {},
                                categoryRatios: payload.new.categoryRatios || {},
                                projects: payload.new.projects || [],
                                teamMembers: payload.new.teamMembers || [],
                                exchangeRate: payload.new.exchangeRate || 195
                            });
                        }
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'security_settings' }, payload => {
                        if (payload.eventType === 'UPDATE' || payload.eventType === 'INSERT') {
                            setSecurity({
                                master: payload.new.master || DEFAULT_MASTER_PW,
                                memberPasswords: payload.new.memberPasswords || {}
                            });
                        }
                    })
                    .subscribe();

                return () => {
                    active = false;
                    refreshProductsRef.current = null;
                    clearInterval(productSyncTimer);
                    window.removeEventListener('focus', handleFocus);
                    supabase.removeChannel(channel);
                };
            }, []);

            const commentsByProduct = useMemo(() => {
                const map = {};
                allComments.forEach(c => {
                    if (!map[c.productId]) map[c.productId] = [];
                    map[c.productId].push(c);
                });
                Object.keys(map).forEach(k => {
                    map[k].sort((a, b) => a.createdAt - b.createdAt);
                });
                return map;
            }, [allComments]);

            const addCommentToScreen = useCallback((comment) => {
                setAllComments(current => current.some(item => item.id === comment.id) ? current : [...current, comment]);
            }, []);

            const removeCommentFromScreen = useCallback((id) => {
                setAllComments(current => current.filter(item => item.id !== id));
            }, []);

            const currentUserSettings = useMemo(() => (settings.teamMembers || []).find(m => m.key === userKey), [settings.teamMembers, userKey]);
            const isConfirmedOnlyView = useMemo(() => {
                if (userRole !== 'member') return false;
                return currentUserSettings?.isConfirmedOnly === true || String(currentUserSettings?.isConfirmedOnly) === 'true';
            }, [userRole, currentUserSettings]);

            // 핵심 수정 포인트 2: .map() 객체 복제 로직 제거. (React.memo 무력화 방지)
            const displayProducts = useMemo(() => {
                return products.filter(p => {
                    if (isConfirmedOnlyView) {
                        return p.isConfirmed || p.isFinalized || p.isSampleRequested;
                    }
                    return true;
                });
            }, [products, isConfirmedOnlyView]);

            const filteredProducts = useMemo(() => {
                let list = displayProducts.filter(p => !p.isDeleted);
                if (activeProject !== "전체") list = list.filter(p => p.project === activeProject);
                if (activeMainCategory !== "전체") {
                    list = list.filter(p => (p.mainCategory || "미분류") === activeMainCategory);
                    if (activeCategory !== "전체") list = list.filter(p => (p.category || "미지정") === activeCategory);
                }
                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    list = list.filter(p => p.name?.toLowerCase().includes(term) || p.option?.toLowerCase().includes(term) || (p.itemCode && p.itemCode.toLowerCase().includes(term)));
                }
                
                if (filterStatus === 'finalized') list = list.filter(p => p.isFinalized);
                else if (filterStatus === 'confirmed') list = list.filter(p => p.isConfirmed);
                else if (filterStatus === 'sample') list = list.filter(p => p.isSampleRequested);
                else if (filterStatus === 'unconfirmed') list = list.filter(p => !p.isConfirmed && !p.isHeld && !p.isFinalized && !p.isSampleRequested);
                else if (filterStatus === 'held') list = list.filter(p => p.isHeld && !p.isConfirmed && !p.isFinalized);
                
                return list.sort((a, b) => {
                    let aValue, bValue;
                    if (sortConfig.key === 'customOrder') {
                        const priorityA = a.isFinalized ? 1 : (a.isConfirmed ? 2 : (a.isSampleRequested ? 3 : (a.isHeld ? 5 : 4)));
                        const priorityB = b.isFinalized ? 1 : (b.isConfirmed ? 2 : (b.isSampleRequested ? 3 : (b.isHeld ? 5 : 4)));
                        if (priorityA !== priorityB) return priorityA - priorityB;
                        aValue = a.customOrder !== undefined ? a.customOrder : -(a.createdAt || 0);
                        bValue = b.customOrder !== undefined ? b.customOrder : -(b.createdAt || 0);
                        if (aValue === bValue) return (b.createdAt || 0) - (a.createdAt || 0);
                    } else if (sortConfig.key === 'margin') {
                        aValue = (a.price || 0) - (a.cost || 0);
                        bValue = (b.price || 0) - (b.cost || 0);
                    } else if (sortConfig.key === 'createdAt') {
                        aValue = a.createdAt || 0;
                        bValue = b.createdAt || 0;
                    } else if (sortConfig.key === 'updatedAt') {
                        aValue = a.updatedAt || a.createdAt || 0;
                        bValue = b.updatedAt || b.createdAt || 0;
                    } else {
                        aValue = a[sortConfig.key] || 0;
                        bValue = b[sortConfig.key] || 0;
                    }
                    if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
            }, [displayProducts, activeProject, activeMainCategory, activeCategory, searchTerm, filterStatus, sortConfig]);

            const totalPages = Math.max(1, Math.ceil(filteredProducts.length / TABLE_PAGE_SIZE));
            const pageStartIndex = (currentPage - 1) * TABLE_PAGE_SIZE;
            const visibleProducts = useMemo(
                () => filteredProducts.slice(pageStartIndex, pageStartIndex + TABLE_PAGE_SIZE),
                [filteredProducts, pageStartIndex]
            );

            useEffect(() => {
                if (currentPage > totalPages) setCurrentPage(totalPages);
            }, [currentPage, totalPages]);


            // =====================================================================
            // [에러 방지 완벽 통제 시스템] - 에러 시 화면 롤백(되돌리기) 및 빨간 경고창 표시
            // =====================================================================
            const applyDbUpdate = useCallback(async (id, originalItem, changes, successMsg = null) => {
                const updatedAt = Date.now();
                // 1. 화면 즉각 반응 (Optimistic Update)
                setProducts(prev => {
                    const next = prev.map(p => p.id === id ? { ...p, ...changes, updatedAt } : p);
                    productsRef.current = next;
                    return next;
                });
                
                // 2. 실제 DB 저장 (여기서 실패를 잡아야 합니다)
                const { error } = await supabase
                    .from('products')
                    .update({ ...changes, updatedAt })
                    .eq('id', id);
                    
                // 3. 에러 발생 시 원래 상태로 롤백 및 에러 토스트 출력
                if (error) {
                    console.error("DB 업데이트 실패:", error);
                    setProducts(prev => {
                        const next = prev.map(p => p.id === id ? { ...p, ...originalItem } : p);
                        productsRef.current = next;
                        return next;
                    });
                    showToast(`DB 저장 실패: ${error.message}`, "error"); // 원인 출력
                } else if (successMsg) {
                    showToast(successMsg);
                }
            }, [showToast]);

            const startEditingNo = useCallback((item, currentNo) => {
                if (sortConfig.key !== 'customOrder' || sortConfig.direction !== 'asc') {
                    showToast("오른쪽 위의 정렬 기준을 '내 임의 정렬 (수동)'으로 설정해야 순서를 바꿀 수 있습니다.", "error");
                    return;
                }
                setEditingNoId(item.id);
                setEditingNoValue(currentNo.toString());
            }, [sortConfig, showToast]);

            const submitNewNo = useCallback(async (item, currentIdx) => {
                setEditingNoId(null);
                const desiredNo = parseInt(editingNoValue, 10);
                if (isNaN(desiredNo) || desiredNo <= 0) return;
                const targetIdx = desiredNo - 1;
                const maxIdx = filteredProducts.length - 1;
                const clampedTargetIdx = Math.max(0, Math.min(targetIdx, maxIdx));
                if (currentIdx === clampedTargetIdx) return;
                const tempArray = filteredProducts.filter((_, idx) => idx !== currentIdx);
                let newOrder;
                if (clampedTargetIdx === 0) {
                    const firstOrder = tempArray[0].customOrder !== undefined ? tempArray[0].customOrder : -(tempArray[0].createdAt || 0);
                    newOrder = firstOrder - 1000;
                } else if (clampedTargetIdx >= tempArray.length) {
                    const lastOrder = tempArray[tempArray.length - 1].customOrder !== undefined ? tempArray[tempArray.length - 1].customOrder : -(tempArray[tempArray.length - 1].createdAt || 0);
                    newOrder = lastOrder + 1000;
                } else {
                    const beforeOrder = tempArray[clampedTargetIdx - 1].customOrder !== undefined ? tempArray[clampedTargetIdx - 1].customOrder : -(tempArray[clampedTargetIdx - 1].createdAt || 0);
                    const afterOrder = tempArray[clampedTargetIdx].customOrder !== undefined ? tempArray[clampedTargetIdx].customOrder : -(tempArray[clampedTargetIdx].createdAt || 0);
                    newOrder = (beforeOrder + afterOrder) / 2;
                }
                
                applyDbUpdate(
                    item.id, 
                    { customOrder: item.customOrder }, 
                    { customOrder: newOrder }, 
                    `${desiredNo}번 위치로 이동되었습니다.`
                );
            }, [editingNoValue, filteredProducts, applyDbUpdate]);

            const handleMoveOrder = useCallback(async (idx, direction) => {
                if (sortConfig.key !== 'customOrder' || sortConfig.direction !== 'asc') {
                    showToast("오른쪽 위의 정렬 기준을 '내 임의 정렬 (수동)'으로 설정해야 순서를 바꿀 수 있습니다.", "error");
                    return;
                }
                const targetIdx = direction === 'up' ? idx - 1 : idx + 1;
                if (targetIdx < 0 || targetIdx >= filteredProducts.length) return;
                const currentItem = filteredProducts[idx];
                const targetItem = filteredProducts[targetIdx];
                let newOrder;
                if (direction === 'up') {
                    const beforeTarget = filteredProducts[targetIdx - 1];
                    const targetOrder = targetItem.customOrder !== undefined ? targetItem.customOrder : -(targetItem.createdAt || 0);
                    if (beforeTarget) {
                        const beforeOrder = beforeTarget.customOrder !== undefined ? beforeTarget.customOrder : -(beforeTarget.createdAt || 0);
                        newOrder = (beforeOrder + targetOrder) / 2;
                    } else { newOrder = targetOrder - 1000; }
                } else {
                    const afterTarget = filteredProducts[targetIdx + 1];
                    const targetOrder = targetItem.customOrder !== undefined ? targetItem.customOrder : -(targetItem.createdAt || 0);
                    if (afterTarget) {
                        const afterOrder = afterTarget.customOrder !== undefined ? afterTarget.customOrder : -(afterTarget.createdAt || 0);
                        newOrder = (targetOrder + afterOrder) / 2;
                    } else { newOrder = targetOrder + 1000; }
                }

                applyDbUpdate(
                    currentItem.id, 
                    { customOrder: currentItem.customOrder }, 
                    { customOrder: newOrder }
                );
            }, [filteredProducts, sortConfig, showToast, applyDbUpdate]);

            const toggleStatus = useCallback((item, memberKey) => {
                const current = item.approvals?.[memberKey] || 'pending';
                const next = current === 'approved' ? 'rejected' : (current === 'rejected' ? 'pending' : 'approved');
                const newApprovals = { ...(item.approvals || {}), [memberKey]: next };
                
                applyDbUpdate(
                    item.id,
                    { approvals: item.approvals },
                    { approvals: newApprovals }
                );
            }, [applyDbUpdate]);

            const toggleConfirm = useCallback((item) => {
                const nextVal = !item.isConfirmed;
                applyDbUpdate(
                    item.id,
                    { isConfirmed: item.isConfirmed, isHeld: item.isHeld, isFinalized: item.isFinalized },
                    { isConfirmed: nextVal, isHeld: false, isFinalized: false }
                );
            }, [applyDbUpdate]);

            const toggleFinalize = useCallback((item) => {
                const nextVal = !item.isFinalized;
                applyDbUpdate(
                    item.id,
                    { isFinalized: item.isFinalized, isConfirmed: item.isConfirmed, isHeld: item.isHeld },
                    { isFinalized: nextVal, isConfirmed: false, isHeld: false }
                );
            }, [applyDbUpdate]);

            const toggleHold = useCallback((item) => {
                const nextVal = !item.isHeld;
                applyDbUpdate(
                    item.id,
                    { isHeld: item.isHeld, isConfirmed: item.isConfirmed, isFinalized: item.isFinalized },
                    { isHeld: nextVal, isConfirmed: false, isFinalized: false }
                );
            }, [applyDbUpdate]);

            const toggleSample = useCallback((item) => {
                const nextVal = !item.isSampleRequested;
                applyDbUpdate(
                    item.id,
                    { isSampleRequested: item.isSampleRequested },
                    { isSampleRequested: nextVal },
                    nextVal ? "샘플이 신청되었습니다." : "샘플 신청이 취소되었습니다."
                );
            }, [applyDbUpdate]);

            const handleDeleteItem = useCallback((item) => {
                if(confirm('이 항목을 삭제하시겠습니까?')) {
                    applyDbUpdate(
                        item.id,
                        { isDeleted: item.isDeleted },
                        { isDeleted: true },
                        "휴지통으로 이동되었습니다."
                    );
                }
            }, [applyDbUpdate]);


            const handleAddOrUpdateProduct = async (e) => {
                e.preventDefault();
                const payload = { 
                    ...productForm, 
                    cost: Number(productForm.cost), 
                    price: Number(productForm.price), 
                    updatedAt: Date.now(),
                    links: productForm.links.filter(l => l.trim()),
                    naverLinks: productForm.naverLinks.filter(l => l.trim())
                };
                try {
                    if (editingItem) {
                        const updatePayload = { ...payload };
                        if (payload.image === editingItem.image) delete updatePayload.image;
                        if (payload.optionImage === editingItem.optionImage) delete updatePayload.optionImage;
                        const { error } = await supabase.from('products').update(updatePayload).eq('id', editingItem.id);
                        if (error) throw error;
                        setImageMap(prev => ({
                            ...prev,
                            [editingItem.id]: { image: productForm.image, optionImage: productForm.optionImage }
                        }));
                        requestedImageIdsRef.current.add(editingItem.id);
                    } else {
                        const newItemCode = generateItemCode();
                        const { error } = await supabase.from('products').insert([{ 
                            ...payload, 
                            itemCode: newItemCode, 
                            createdAt: Date.now(), 
                            isConfirmed: false, 
                            isFinalized: false, 
                            isHeld: false, 
                            isSampleRequested: false, 
                            isDeleted: false, 
                            approvals: {} 
                        }]);
                        if (error) throw error;
                    }
                    if (refreshProductsRef.current) await refreshProductsRef.current(false);
                    setIsAddModalOpen(false);
                    showToast("저장되었습니다.");
                } catch(e) { showToast(`저장 오류: ${e.message}`, "error"); }
            };

            const handleSelectAll = (e) => {
                if (e.target.checked) setSelectedItems(filteredProducts.map(p => p.id));
                else setSelectedItems([]);
            };

            const handleSelectItem = useCallback((id) => {
                setSelectedItems(prev => prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]);
            }, []);

            const handleBulkDelete = async () => {
                if (!confirm(`선택한 ${selectedItems.length}개 상품을 정말 삭제하시겠습니까?`)) return;
                try {
                    const { error } = await supabase.from('products').update({ isDeleted: true, updatedAt: Date.now() }).in('id', selectedItems);
                    if (error) throw error;
                    if (refreshProductsRef.current) await refreshProductsRef.current(false);
                    setSelectedItems([]);
                    showToast(`선택한 항목이 휴지통으로 이동되었습니다.`);
                } catch (e) { showToast(`삭제 오류: ${e.message}`, "error"); }
            };

            const handleBulkMove = async (e) => {
                e.preventDefault();
                if (!bulkMoveTarget.project || !bulkMoveTarget.mainCategory || !bulkMoveTarget.category) { showToast("모든 항목을 선택해주세요.", "error"); return; }
                try {
                    const { error } = await supabase.from('products').update({ 
                        project: bulkMoveTarget.project, 
                        mainCategory: bulkMoveTarget.mainCategory, 
                        category: bulkMoveTarget.category, 
                        updatedAt: Date.now() 
                    }).in('id', selectedItems);
                    if (error) throw error;
                    if (refreshProductsRef.current) await refreshProductsRef.current(false);
                    setIsBulkMoveModalOpen(false);
                    setSelectedItems([]);
                    showToast(`선택한 항목의 카테고리가 변경되었습니다.`);
                } catch (e) { showToast(`이동 오류: ${e.message}`, "error"); }
            };

            const handleDownloadTemplate = () => {
                const headers = ["상품코드", "프로젝트", "대분류", "소분류", "상품명", "옵션", "위안가", "도착가", "판매가", "소싱링크", "경쟁사링크"];
                const example = ["", "2026 여름", "기본 분류", "아쿠아슈즈", "예시 상품명", "빨강/L", "10.5", "5000", "15000", "http://1688.com/... | http://taobao.com/...", "http://smartstore/..."];
                const csvContent = "\uFEFF" + headers.join(",") + "\n" + example.join(",");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "대량등록_빈템플릿.csv";
                link.click();
            };

            const handleDownloadAllAsTemplate = () => {
